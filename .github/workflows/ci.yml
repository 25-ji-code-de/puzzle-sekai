name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
      - name: Enable Corepack
        run: corepack enable
      - name: Install
        run: yarn install --immutable
      - name: Test
        run: yarn test
      - name: Typecheck
        run: yarn tsc --noEmit
      - name: Lint
        run: yarn lint
      - name: Format
        run: yarn format:check
      - name: Build
        run: yarn build
