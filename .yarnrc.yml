approvedGitRepositories:
  - "**"

enableScripts: true

# Yarn Plug'n'Play (strict). Cache is project-local.
nodeLinker: pnp
pnpMode: strict

enableGlobalCache: false
# default when global cache is off: .yarn/cache (project-local)

# pixi-sound@3 peers on @pixi/* packages. Under node-modules those peers were
# satisfied by hoist from pixi.js-legacy; under PnP the workspace must provide
# them (or we inject them as deps of pixi-sound). Pin to the same 5.3.12 line
# that pixi.js-legacy already pulls in.
packageExtensions:
  "pixi-sound@*":
    dependencies:
      "@pixi/core": "5.3.12"
      "@pixi/loaders": "5.3.12"
      "@pixi/ticker": "5.3.12"
      "@pixi/utils": "5.3.12"

npmMinimalAgeGate: 0
