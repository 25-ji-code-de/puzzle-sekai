<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>パズル⭐︎セカ | Puzzle × SEKAI</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
    />
    <script>
      // Early locale detection: set <html lang> and <title> before paint
      (function () {
        var saved = localStorage.getItem("puzzleSekaiLocale");
        var lang = saved || (navigator.language || "").toLowerCase();
        var locale = lang.startsWith("ja") ? "ja" : lang.startsWith("en") ? "en" : "zh";
        document.documentElement.lang = locale === "zh" ? "zh-CN" : locale;
        var titles = {
          zh: "パズル⭐︎セカ | Puzzle × SEKAI",
          ja: "パズル⭐︎セカ | Puzzle × SEKAI",
          en: "Puzzle ⭐︎ SEKAI",
        };
        document.title = titles[locale] || titles.zh;
      })();
    </script>
  </head>
  <body>
    <main class="main">
      <div class="game">
        <small data-i18n="noscript">
          如果你看到空白页面，可能是浏览器不支持 WebGL。<br />
          请尝试使用 Chrome 等现代浏览器。
        </small><br />
      </div>
    </main>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
