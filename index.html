<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>パズル⭐︎セカ | Puzzle × SEKAI</title>
    <meta
      name="description"
      content="Project SEKAI 主题的方块消除游戏。收集成员、消除方块，挑战最高分！（同人作品）"
    />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
    />
    <!--
      Critical boot-shell styles: paint the LCP title before the game bundle runs.
      JS (src/welcome.ts) adopts #boot-welcome and only upgrades bg image / fonts.
    -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        color: #fff;
        overflow: hidden;
      }
      #boot-welcome {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: default;
        background-color: #0a0a12;
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
      }
      #boot-welcome .boot-welcome__dim {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        transition: opacity 0.3s ease;
      }
      #boot-welcome .welcome-card {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 40px 60px;
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.45);
        border: 2px solid rgba(180, 220, 255, 0.35);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        box-shadow:
          0 8px 40px rgba(0, 0, 0, 0.6),
          0 0 60px rgba(100, 200, 255, 0.08) inset;
      }
      #boot-welcome .welcome-title {
        font-size: 42px;
        color: #fff;
        letter-spacing: 3px;
        text-shadow: 0 2px 12px rgba(100, 200, 255, 0.4);
        margin: 0 0 24px;
        /* Brand stack; web face swaps in once fonts.ts loads */
        font-family:
          "NishikiTeki", "Yu Gothic", "Hiragino Sans", "Hiragino Kaku Gothic ProN",
          "Microsoft YaHei", "PingFang SC", sans-serif;
        font-weight: 400;
      }
      #boot-welcome .welcome-subtitle {
        font-size: 17px;
        color: rgba(180, 220, 255, 0.7);
        letter-spacing: 4px;
        margin: 0 0 24px;
        font-family:
          "NishikiTeki", "Yu Gothic", "Hiragino Sans", "Hiragino Kaku Gothic ProN",
          "Microsoft YaHei", "PingFang SC", sans-serif;
        font-weight: 400;
      }
      #boot-welcome .welcome-desc {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.6);
        line-height: 1.85;
        margin: 0 0 24px;
        font-family:
          "MaokenAssortedSans", "Microsoft YaHei", "PingFang SC", "Noto Sans SC",
          sans-serif;
        font-weight: 400;
      }
      html[lang="ja"] #boot-welcome .welcome-desc,
      html[lang="en"] #boot-welcome .welcome-desc {
        font-family:
          "NishikiTeki", "Yu Gothic", "Hiragino Sans", "Hiragino Kaku Gothic ProN",
          "Microsoft YaHei", "PingFang SC", sans-serif;
      }
      #boot-welcome .welcome-click {
        font-size: 20px;
        color: rgba(255, 255, 255, 0.85);
        letter-spacing: 0.14em;
        margin-top: 24px;
        font-family:
          "MaokenAssortedSans", "Microsoft YaHei", "PingFang SC", "Noto Sans SC",
          sans-serif;
        font-weight: 400;
      }
      html[lang="ja"] #boot-welcome .welcome-click,
      html[lang="en"] #boot-welcome .welcome-click {
        font-family:
          "NishikiTeki", "Yu Gothic", "Hiragino Sans", "Hiragino Kaku Gothic ProN",
          "Microsoft YaHei", "PingFang SC", sans-serif;
      }
      @keyframes promptPulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      @media (orientation: portrait) and (max-width: 900px) {
        #boot-welcome .welcome-card {
          margin: 0 16px;
          padding: 28px 22px;
          max-width: min(420px, 92vw);
        }
        #boot-welcome .welcome-title {
          font-size: 30px;
          letter-spacing: 2px;
          margin-bottom: 16px;
        }
        #boot-welcome .welcome-subtitle {
          font-size: 14px;
          letter-spacing: 2px;
          margin-bottom: 16px;
        }
        #boot-welcome .welcome-desc {
          font-size: 14px;
          margin-bottom: 16px;
        }
        #boot-welcome .welcome-click {
          font-size: 16px;
          margin-top: 12px;
        }
      }
    </style>
    <script>
      // Early locale: <html lang>, <title>, meta description before first paint.
      // Boot-shell copy is applied by the inline script right after #boot-welcome.
      (function () {
        var saved = localStorage.getItem("puzzleSekaiLocale");
        var lang = saved || (navigator.language || "").toLowerCase();
        var locale = lang.startsWith("ja")
          ? "ja"
          : lang.startsWith("en")
            ? "en"
            : "zh";
        document.documentElement.lang = locale === "zh" ? "zh-CN" : locale;
        document.documentElement.setAttribute("data-boot-locale", locale);
        var titles = {
          zh: "パズル⭐︎セカ | Puzzle × SEKAI",
          ja: "パズル⭐︎セカ | Puzzle × SEKAI",
          en: "Puzzle ⭐︎ SEKAI",
        };
        var descriptions = {
          zh: "Project SEKAI 主题的方块消除游戏。收集成员、消除方块，挑战最高分！（同人作品）",
          ja: "Project SEKAIのメンバーを集めてブロックを消すパズルゲーム。ハイスコアを目指そう！（ファン作品）",
          en: "A Project SEKAI-themed puzzle game. Clear blocks with unit members and chase high scores. Unofficial fan work.",
        };
        document.title = titles[locale] || titles.zh;
        var meta = document.querySelector('meta[name="description"]');
        if (meta)
          meta.setAttribute("content", descriptions[locale] || descriptions.zh);
      })();
    </script>
  </head>
  <body>
    <!--
      Static boot shell: present in the first HTML response so the LCP title
      (welcome-title) can paint without waiting for the game JS bundle.
      Adopted by src/welcome.ts — do not remove the ids/classes it keys on.
    -->
    <div
      id="boot-welcome"
      role="dialog"
      aria-modal="true"
      aria-labelledby="boot-welcome-title"
    >
      <div class="boot-welcome__dim" aria-hidden="true"></div>
      <div class="welcome-card">
        <div id="boot-welcome-title" class="welcome-title">パズル⭐︎セカ</div>
        <div id="boot-welcome-subtitle" class="welcome-subtitle">
          ～ Puzzle × SEKAI ～
        </div>
        <div id="boot-welcome-desc" class="welcome-desc">
          收集 Project SEKAI 的成员<br />消除方块，达成最高分！
        </div>
        <div id="boot-welcome-click" class="welcome-click">加载中 0%</div>
      </div>
    </div>
    <script>
      // Localize boot-shell copy immediately (nodes already in the DOM).
      (function () {
        var locale =
          document.documentElement.getAttribute("data-boot-locale") || "zh";
        var boot = {
          zh: {
            title: "パズル⭐︎セカ",
            subtitle: "～ Puzzle × SEKAI ～",
            desc: "收集 Project SEKAI 的成员<br>消除方块，达成最高分！",
            loading: "加载中",
          },
          ja: {
            title: "パズル⭐︎セカ",
            subtitle: "～ Puzzle × SEKAI ～",
            desc: "Project SEKAIのメンバーを集めて<br>ブロックを消し、ハイスコアを目指そう！",
            loading: "読み込み中",
          },
          en: {
            title: "パズル⭐︎セカ",
            subtitle: "～ Puzzle × SEKAI ～",
            desc: "Gather the members of Project SEKAI,<br>clear the blocks, and chase the high score!",
            loading: "Loading",
          },
        };
        var copy = boot[locale] || boot.zh;
        var titleEl = document.getElementById("boot-welcome-title");
        var subtitleEl = document.getElementById("boot-welcome-subtitle");
        var descEl = document.getElementById("boot-welcome-desc");
        var clickEl = document.getElementById("boot-welcome-click");
        if (titleEl) titleEl.textContent = copy.title;
        if (subtitleEl) subtitleEl.textContent = copy.subtitle;
        if (descEl) descEl.innerHTML = copy.desc;
        if (clickEl) clickEl.textContent = copy.loading + " 0%";
      })();
    </script>

    <main class="main">
      <div class="game">
        <small data-i18n="noscript">
          如果你看到空白页面，可能是浏览器不支持 WebGL。<br />
          请尝试使用 Chrome 等现代浏览器。
        </small><br />
      </div>
    </main>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
